name: Argparse to Boutiques
description: Create a Boutiques descriptor for a Python CLI based on `argparse.ArgumentParser`
inputs:
  parser-location:
    description: Module path to and name of function that produces the `argparse.ArgumentParser` object. E.g., "my_package.my_module:my_func_name"
    required: true
  token:
    description: GitHub token with permissions to create pull requests. If using the repository's default GITHUB_TOKEN, ensure that it has write permissions for "contents" and "pull-requests" to create pull requests.
    required: true
  output-path:
    description: Where the output Boutiques description file should be written
    required: true

runs:
  using: composite
  steps:

    - name: Set up Node.js
      uses: actions/setup-node@v6

    - name: Create descriptor
      run: |
        # change directory avoid interference from the user's codebase
        cd ${{ github.action_path }}

        # install Styx
        npm install @styx-api/core

        # install argdump
        pip install -U pip
        pip install argdump

        # create argdump from argparse
        python ./scripts/run_argdump.py --output $ARGDUMP_FILE $PARSER_LOCATION
        cat $ARGDUMP_FILE

        # create boutiques descriptor from argdump
        npx -y --package @styx-api/cli styx build $ARGDUMP_FILE --out styx-out --backend boutiques

        # move descriptor to output path
        mkdir -p $(dirname $OUTPUT_PATH)
        mv ./styx-out/boutiques/descriptor.json $OUTPUT_PATH
        cat $OUTPUT_PATH
      env:
        PARSER_LOCATION: ${{ inputs.parser-location }}
        OUTPUT_PATH: ${{ github.workspace }}/${{ inputs.output-path }}
        ARGDUMP_FILE: argdump.json
      shell: bash

    - name: Open pull request
      uses: peter-evans/create-pull-request@v8
      with:
        title: "Add/update Boutiques descriptor"
        commit-message: "Add/update Boutiques descriptor for ${{ inputs.location }}"
        body: "This pull request was automatically generated by the [`argparse-to-boutiques`](https://github.com/michellewang/argparse-to-boutiques) GitHub Action."
        add-paths: |
          ${{ inputs.output-path }}
        branch: "bot/argparse-to-boutiques"
        token: ${{ inputs.token }}
