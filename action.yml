name: CLI to Boutiques
description: Create a Boutiques descriptor for a Python CLI based on `argparse` or `click`
inputs:
  parser-type:
    description: Type of parser to serialize. Either "argparse" or "click".
    required: true
    default: argparse
  parser-location:
    description: Module path to and name of function that produces the argparse.ArgumentParser or click.Command objects. E.g., "my_package.my_module:my_func_name"
    required: true
  output-path:
    description: Where the output Boutiques description file should be written
    required: true
  open-pr:
    description: Whether to open a pull request with the generated descriptor. If this is set to true (default), a GitHub token must be provided as well.
    required: false
    default: true
  token:
    description: GitHub token with write permissions for "contents" and "pull-requests". Required if open-pr is true.
    required: false
  click-prog-name:
    description: Program name to use for the Click parser type. By default this will be the name of the decorated function.
    required: false
  click-parent-location:
    description: Module path to and name of function that produces the click.Group object that contains the click.Command object to serialize. E.g., "my_package.my_module:my_func_name". This is needed for nested commands.
    required: false
  exclude-version:
    description: Whether to exclude the tool-version field in the Boutiques descriptor even if version information is available. This is enabled by default because dynamic versioning schemes can cause the descriptor to be updated on every commit.
    required: false
    default: true
  updates-file:
    description: 'Path to a JSON file with updates to apply to the generated Boutiques descriptor. The file should contain a map of dot/bracket paths to values (e.g. {"description": "new desc"}).'
    required: false
  updates-str:
    description: 'JSON string with updates to apply to the generated Boutiques descriptor. The string should contain a map of dot/bracket paths to values (e.g. {"description": "new desc"}). Updates specified this way will override those in the updates file.'
    required: false

runs:
  using: composite
  steps:

    - name: Validate inputs
      run: |
        if [[ "${{ inputs.parser-type }}" != "argparse" && "${{ inputs.parser-type }}" != "click" ]]; then
          echo "::error::parser-type must be 'argparse' or 'click', got '${{ inputs.parser-type }}'"
          exit 2
        fi
        if [[ "${{ inputs.open-pr }}" == "true" && -z "${{ inputs.token }}" ]]; then
          echo "::error::token must be provided if open-pr is true"
          exit 2
        fi
      shell: bash

    - name: Set up Node.js
      uses: actions/setup-node@v6

    - name: Create descriptor
      run: |
        # change directory avoid interference from the user's codebase
        cd ${{ github.action_path }}

        # install Styx
        npm install @styx-api/core

        pip install -U pip
        if [[ "$PARSER_TYPE" == "click" ]]; then
          # install clickdump from GitHub
          pip install git+https://github.com/michellewang/clickdump.git

          # create dump from click command
          CLICK_ARGS=(--output "$DUMP_FILE")
          if [[ -n "$CLICK_PROG_NAME" ]]; then
            CLICK_ARGS+=(--prog "$CLICK_PROG_NAME")
          fi
          if [[ -n "$CLICK_PARENT_LOCATION" ]]; then
            CLICK_ARGS+=(--parent "$CLICK_PARENT_LOCATION")
          fi
          python ./scripts/run_clickdump.py "${CLICK_ARGS[@]}" $PARSER_LOCATION
        else
          # install argdump
          pip install argdump

          # create dump from argparse
          python ./scripts/run_argdump.py --output $DUMP_FILE $PARSER_LOCATION
        fi

        cat $DUMP_FILE

        # create boutiques descriptor from dump
        npx -y --package @styx-api/cli styx build $DUMP_FILE --out styx-out --backend boutiques

        # move descriptor to output path
        mkdir -p $(dirname $OUTPUT_PATH)
        mv ./styx-out/boutiques/descriptor.json $OUTPUT_PATH
        cat $OUTPUT_PATH

        # apply user-specified updates
        UPDATES_DESCRIPTOR_ARGS=()
        if [[ "${EXCLUDE_VERSION}" == "true" ]]; then
          UPDATES_DESCRIPTOR_ARGS+=(--remove-version)
        fi
        if [[ -n "${UPDATES_FILE}" ]]; then
          UPDATES_DESCRIPTOR_ARGS+=(--updates-file ${{ github.workspace }}/${UPDATES_FILE})
        fi
        if [[ -n "${UPDATES_STR}" ]]; then
          UPDATES_DESCRIPTOR_ARGS+=(--updates-str "${UPDATES_STR}")
        fi
        if [[ "${#UPDATES_DESCRIPTOR_ARGS[@]}" -gt 0 ]]; then
          python ./scripts/update_descriptor.py --descriptor $OUTPUT_PATH "${UPDATES_DESCRIPTOR_ARGS[@]}"
          cat $OUTPUT_PATH
        fi
      env:
        PARSER_TYPE: ${{ inputs.parser-type }}
        PARSER_LOCATION: ${{ inputs.parser-location }}
        OUTPUT_PATH: ${{ github.workspace }}/${{ inputs.output-path }}
        DUMP_FILE: dump.json
        CLICK_PROG_NAME: ${{ inputs.click-prog-name }}
        CLICK_PARENT_LOCATION: ${{ inputs.click-parent-location }}
        EXCLUDE_VERSION: ${{ inputs.exclude-version }}
        UPDATES_FILE: ${{ inputs.updates-file }}
        UPDATES_STR: ${{ inputs.updates-str }}
      shell: bash

    - name: Sanitize branch name
      id: sanitize
      if: ${{ inputs.open-pr == 'true' }}
      run: |
        SANITIZED="${{ inputs.parser-location }}"
        SANITIZED="${SANITIZED//./__}"
        SANITIZED="${SANITIZED//:/-}"
        echo "branch=argparse-to-boutiques/${SANITIZED}" >> "$GITHUB_OUTPUT"
      shell: bash

    - name: Open pull request
      if: ${{ inputs.open-pr == 'true' }}
      uses: peter-evans/create-pull-request@v8
      with:
        title: "Add/update Boutiques descriptor for ${{ inputs.parser-location }}"
        commit-message: "Add/update Boutiques descriptor for ${{ inputs.parser-location }}"
        body: "This pull request was automatically generated by the [`python-cli-to-boutiques`](https://github.com/michellewang/python-cli-to-boutiques) GitHub Action."
        add-paths: |
          ${{ inputs.output-path }}
        branch: ${{ steps.sanitize.outputs.branch }}
        token: ${{ inputs.token }}
